name: Publish to PyPI

# Triggers on every GitHub Release (draft releases are ignored).
# The version number is read from the git tag via setuptools-scm —
# no manual version bumping required.

on:
  release:
    types: [published]

jobs:
  # -----------------------------------------------------------------------
  # 1. Run the full test suite first — never publish a broken release
  # -----------------------------------------------------------------------
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # required for setuptools-scm to read git tags

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short

  # -----------------------------------------------------------------------
  # 2. Build the source distribution (sdist) and wheel
  # -----------------------------------------------------------------------
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution with twine
        run: |
          pip install twine
          twine check dist/*

      # Upload the built files as a workflow artifact so the publish job
      # can download them without rebuilding
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------------------------------------------------
  # 3. Publish to PyPI using Trusted Publisher (no API token required)
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Required for OIDC trusted publishing
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/wetlandmapper

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token needed — uses OIDC Trusted Publisher.
        # Set up Trusted Publisher at:
        #   https://pypi.org/manage/account/publishing/
        # with:
        #   publisher: GitHub Actions
        #   repository: manudeo/wetlandmapper
        #   workflow: publish.yml
